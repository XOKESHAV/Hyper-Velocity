            50% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(1.5); opacity: 0; filter: blur(20px); }

<script>
    // Particle/Spark Animation System
    function createSparks() {
        const container = document.getElementById('spark-container');
        const count = 60;
        
        for (let i = 0; i < count; i++) {
            const spark = document.createElement('div');
            spark.className = 'spark';
            
            const startX = Math.random() * window.innerWidth;
            const startY = window.innerHeight + 10;
            const tx = (Math.random() - 0.5) * 200;
            const ty = -(window.innerHeight + 100);
            const duration = 1.5 + Math.random() * 3;
            const delay = Math.random() * 5;

            spark.style.left = `${startX}px`;
            spark.style.top = `${startY}px`;
            spark.style.setProperty('--tw-translate-x', `${tx}px`);
            spark.style.setProperty('--tw-translate-y', `${ty}px`);
            spark.style.animation = `spark-fly ${duration}s ease-in ${delay}s infinite`;
            
            container.appendChild(spark);
        }
    }

    // 3-2-1 Countdown Animation
    function runCountdown() {
        const digit = document.getElementById('countdown-digit');
        const heroContent = document.getElementById('hero-content');
        const countdownOverlay = document.getElementById('countdown-overlay');
        const counts = ['3', '2', '1', 'GO!'];
        let current = 0;

        const nextStep = () => {
            if (current < counts.length) {
                digit.innerText = counts[current];
                digit.classList.remove('animate-countdown');
                void digit.offsetWidth; // Force reflow
                digit.classList.add('animate-countdown');
                
                if (counts[current] === 'GO!') {
                    digit.classList.add('text-tertiary', 'glitch-text');
                }
                
                current++;
                setTimeout(nextStep, 1000);
            } else {
                countdownOverlay.style.display = 'none';
                heroContent.classList.remove('opacity-0', 'translate-y-10');
            }
        };

        nextStep();
    }

    // Smooth Mouse Parallax Effect
    document.addEventListener('mousemove', (e) => {
        const bg = document.getElementById('parallax-bg');
        const strength = 30; // pixels to move
        const moveX = (e.clientX - window.innerWidth / 2) / (window.innerWidth / 2) * strength;
        const moveY = (e.clientY - window.innerHeight / 2) / (window.innerHeight / 2) * strength;
        
        bg.style.transform = `scale(1.1) translate(${moveX}px, ${moveY}px)`;
    });

    // Rev Bar Animation
    const revBar = document.getElementById('rev-bar');
    const startBtn = document.getElementById('start-btn');
    let revving = false;

    startBtn.addEventListener('mouseenter', () => {
        revving = true;
        animateRev();
    });

    startBtn.addEventListener('mouseleave', () => {
        revving = false;
        revBar.style.width = '0%';
    });

    function animateRev() {
        if (!revving) return;
        const target = 85 + Math.random() * 15;
        revBar.style.width = `${target}%`;
        setTimeout(() => {
            if (revving) {
                revBar.style.width = `${target - 10}%`;
                setTimeout(animateRev, 40);
            }
        }, 80);
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
        createSparks();
        setTimeout(runCountdown, 500);
    });
</script>
